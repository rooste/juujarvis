spring:
  application:
    name: juujarvis

server:
  port: 8080

juujarvis:
  imessage:
    polling-enabled: false
    own-handles: juujarvis@outlook.com
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5-20251001
  confluence:
    base-url: ${CONFLUENCE_BASE_URL:}
    email: ${CONFLUENCE_EMAIL:}
    api-token: ${CONFLUENCE_API_TOKEN:}
  google:
    credentials-path: secrets/google-credentials.json
    tokens-path: secrets/google-tokens
    calendar-id: primary
  db-path: juujarvis.db

logging:
  level:
    com.juujarvis: DEBUG
  file:
    name: logs/juujarvis.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
