spring:
  application:
    name: juujarvis

server:
  port: 8080

juujarvis:
  imessage:
    polling-enabled: true
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
  confluence:
    base-url: ${CONFLUENCE_BASE_URL:}
    email: ${CONFLUENCE_EMAIL:}
    api-token: ${CONFLUENCE_API_TOKEN:}
  db-path: juujarvis.db

logging:
  level:
    com.juujarvis: DEBUG
  file:
    name: logs/juujarvis.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
