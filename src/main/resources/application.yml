spring:
  application:
    name: juujarvis

server:
  port: 8080

juujarvis:
  imessage:
    polling-enabled: false
    own-handles: juujarvis@outlook.com
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6
  confluence:
    base-url: ${CONFLUENCE_BASE_URL:}
    email: ${CONFLUENCE_EMAIL:}
    api-token: ${CONFLUENCE_API_TOKEN:}
  brave:
    api-key: ${BRAVE_API_KEY:}
  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    tenant-id: ${MICROSOFT_TENANT_ID:}
  email:
    polling-enabled: false
    default-interval-seconds: 1200
    schedules:
      - start: "07:00"
        end: "22:00"
        interval-seconds: 60
  forest:
    spreadsheet-name: ${FOREST_SPREADSHEET_NAME:}
  google:
    credentials-path: secrets/google-credentials.json
    tokens-path: secrets/google-tokens
    calendar-id: primary
  db-path: juujarvis.db

logging:
  level:
    com.juujarvis: DEBUG
  file:
    name: logs/juujarvis.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
