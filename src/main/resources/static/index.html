<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juujarvis</title>
    <link rel="icon" type="image/svg+xml" href="/juujarvis-icon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a3a5c;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #2d6a8f;
        }

        header .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #e2e8f0;
        }

        header .subtitle {
            font-size: 12px;
            color: #4ade80;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-bar {
            padding: 8px 24px;
            background: #0d1f35;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #4ade80;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.outgoing {
            align-self: flex-end;
            background: #2d6a8f;
            border-bottom-right-radius: 4px;
        }

        .message.incoming {
            align-self: flex-start;
            background: #1a2a3c;
            border: 1px solid #2d4a5c;
            border-bottom-left-radius: 4px;
        }

        .message .meta {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .message.incoming .sender {
            color: #4ade80;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .tool-status {
            font-size: 12px;
            color: #f59e0b;
            padding: 4px 0;
            font-style: italic;
        }

        .tool-status.completed {
            color: #4ade80;
        }

        #input-area {
            padding: 16px 24px;
            background: #0d1f35;
            border-top: 1px solid #1a3a5c;
            display: flex;
            gap: 12px;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a2a3c;
            border: 1px solid #2d4a5c;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #4ade80;
        }

        #message-input::placeholder {
            color: #475569;
        }

        #send-btn {
            padding: 12px 24px;
            background: #2d6a8f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #3a8aaa;
        }

        #send-btn:disabled {
            background: #1a2a3c;
            color: #475569;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .typing-indicator {
            display: inline-block;
            color: #64748b;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .message.imessage-in {
            align-self: flex-start;
            background: #1a2a3c;
            border: 1px solid #4a9eff55;
            border-bottom-left-radius: 4px;
        }

        .message.imessage-out {
            align-self: flex-end;
            background: #1a3a2c;
            border: 1px solid #4ade8055;
            border-bottom-right-radius: 4px;
        }

        .imessage-badge {
            font-size: 10px;
            color: #4a9eff;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .message.imessage-out .imessage-badge {
            color: #4ade80;
            text-align: right;
        }

        .version-warning {
            display: none;
            padding: 8px 24px;
            background: #92400e;
            color: #fbbf24;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }

        .version-warning:hover {
            background: #78350f;
        }
    </style>
</head>
<body>
    <header>
        <img class="icon" src="/juujarvis-icon.svg" alt="Juujarvis">
        <div>
            <h1>Juujarvis</h1>
            <div class="subtitle">AI Family Assistant</div>
        </div>
    </header>

    <div class="version-warning" id="version-warning" onclick="location.reload()"></div>

    <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
        <span style="margin-left: auto; color: #475569;">User: Dad</span>
    </div>

    <div id="chat-messages"></div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled />
        <button id="send-btn" disabled>Send</button>
    </div>

    <script>
        const USER_ID = 'dad';
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let stompClient = null;
        let currentStreamDiv = null;  // The message div currently being streamed into
        let currentStreamText = '';    // Accumulated text for current stream

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function () {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();

                // Subscribe to streaming responses
                stompClient.subscribe('/topic/stream/' + USER_ID, function (frame) {
                    const data = JSON.parse(frame.body);
                    handleStreamEvent(data);
                });

                // Subscribe to full messages (for non-streaming responses)
                stompClient.subscribe('/topic/messages/' + USER_ID, function (frame) {
                    const message = JSON.parse(frame.body);
                    addMessage(message.text, 'incoming', 'Juujarvis');
                });

                // Subscribe to iMessage activity feed
                stompClient.subscribe('/topic/imessage', function (frame) {
                    const data = JSON.parse(frame.body);
                    addIMessage(data.direction, data.handle, data.text);
                });
            }, function () {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected — reconnecting...';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            });
        }

        function handleStreamEvent(data) {
            switch (data.type) {
                case 'chunk':
                    if (!currentStreamDiv) {
                        currentStreamDiv = createStreamMessage();
                    }
                    currentStreamText += data.text;
                    updateStreamMessage(currentStreamDiv, currentStreamText);
                    break;

                case 'tool':
                    if (!currentStreamDiv) {
                        currentStreamDiv = createStreamMessage();
                    }
                    addToolStatus(currentStreamDiv, data.tool, data.status);
                    break;

                case 'end':
                    if (currentStreamDiv) {
                        finalizeStreamMessage(currentStreamDiv, currentStreamText);
                    }
                    currentStreamDiv = null;
                    currentStreamText = '';
                    sendBtn.disabled = false;
                    messageInput.focus();
                    break;
            }
        }

        function createStreamMessage() {
            const div = document.createElement('div');
            div.className = 'message incoming';
            div.innerHTML = '<div class="sender">Juujarvis</div><div class="content"></div>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function updateStreamMessage(div, text) {
            const content = div.querySelector('.content');
            content.textContent = text;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addToolStatus(div, toolName, status) {
            let toolDiv = div.querySelector('.tool-' + toolName.replace(/[^a-z0-9]/gi, '-'));
            if (!toolDiv) {
                toolDiv = document.createElement('div');
                toolDiv.className = 'tool-status tool-' + toolName.replace(/[^a-z0-9]/gi, '-');
                // Insert before the content div
                const content = div.querySelector('.content');
                div.insertBefore(toolDiv, content);
            }
            if (status === 'executing') {
                toolDiv.textContent = '\u2699\uFE0F ' + toolName + '...';
                toolDiv.classList.remove('completed');
            } else if (status === 'completed') {
                toolDiv.textContent = '\u2705 ' + toolName;
                toolDiv.classList.add('completed');
            }
        }

        function finalizeStreamMessage(div, text) {
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = new Date().toLocaleTimeString();
            div.appendChild(meta);
        }

        function addMessage(text, type, sender) {
            const div = document.createElement('div');
            div.className = 'message ' + type;

            let html = '';
            if (type === 'incoming' && sender) {
                html += '<div class="sender">' + escapeHtml(sender) + '</div>';
            }
            html += '<div class="content">' + escapeHtml(text) + '</div>';
            html += '<div class="meta">' + new Date().toLocaleTimeString() + '</div>';

            div.innerHTML = html;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addIMessage(direction, handle, text) {
            const div = document.createElement('div');
            div.className = direction === 'in' ? 'message imessage-in' : 'message imessage-out';

            const badge = document.createElement('div');
            badge.className = 'imessage-badge';
            badge.textContent = direction === 'in'
                ? 'iMessage \u2190 ' + handle
                : 'iMessage \u2192 ' + handle;

            const content = document.createElement('div');
            content.className = 'content';
            content.textContent = text;

            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = new Date().toLocaleTimeString();

            div.appendChild(badge);
            div.appendChild(content);
            div.appendChild(meta);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'outgoing');
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: USER_ID,
                        channel: 'WEB_UI',
                        text: text
                    })
                });
            } catch (err) {
                addMessage('Failed to send message: ' + err.message, 'incoming', 'System');
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Version check — detect stale builds
        let initialBuildTime = null;
        const versionWarning = document.getElementById('version-warning');

        async function checkVersion() {
            try {
                const resp = await fetch('/api/version');
                const data = await resp.json();
                if (!initialBuildTime) {
                    initialBuildTime = data.buildTime;
                    return;
                }
                if (data.buildTime !== initialBuildTime) {
                    const built = new Date(parseInt(data.buildTime)).toLocaleString();
                    versionWarning.textContent = 'New build available (' + data.gitHash + ' — ' + built + '). Click to reload.';
                    versionWarning.style.display = 'block';
                }
            } catch (_) {}
        }

        checkVersion();
        setInterval(checkVersion, 30000);

        connect();
    </script>
</body>
</html>
